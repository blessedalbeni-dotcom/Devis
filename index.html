<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Devis Professionnel</title>
    <style>
        :root {
            --primary: #1e293b;
            --accent: #0284c7;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #f1f5f9;
            --border: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px 10px;
            color: #0f172a;
        }

        .app-wrapper {
            max-width: 850px;
            margin: 0 auto;
        }

        /* Panneau de contrôle épuré */
        .control-panel {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            border: 1px solid var(--border);
        }

        .nav-pills {
            display: flex;
            gap: 8px;
            background: #f8fafc;
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
        }

        .nav-link {
            flex: 1;
            text-align: center;
            padding: 8px;
            background: transparent;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            color: #64748b;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-link.active {
            background: #ffffff;
            color: var(--primary);
            box-shadow: 0 1px 3px rgb(0 0 0 / 0.1);
        }

        .form-grid {
            display: grid;
            gap: 12px;
        }

        .pane { display: none; }
        .pane.active { display: block; }

        textarea, input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            background: #f8fafc;
            box-sizing: border-box;
        }

        textarea:focus, input:focus {
            outline: none;
            border-color: var(--accent);
            background: #fff;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        .btn:hover { opacity: 0.9; }
        .btn-success { background: var(--success); }

        .history-list {
            margin-top: 10px;
            background: #f8fafc;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            max-height: 150px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 13px;
        }

        .history-item:last-child { border-bottom: none; }

        /* ZONE DU DOCUMENT PDF (Rendu impeccable) */
        .document-preview {
            background: white;
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05);
            border: 1px solid var(--border);
            min-height: 297mm; /* Format A4 proportionnel */
            box-sizing: border-box;
        }

        .doc-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 35px;
        }

        .doc-title {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 0;
        }

        .doc-table {
            width: 100%;
            border-collapse: collapse;
            margin: 25px 0;
        }

        .doc-table th {
            background: #f8fafc;
            color: #475569;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #cbd5e1;
            padding: 10px;
            text-align: left;
        }

        .doc-table td {
            padding: 12px 10px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
            color: #334155;
        }

        .text-right { text-align: right !important; }
        
        .doc-totals {
            margin-left: auto;
            width: 320px;
            margin-top: 20px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
            color: #475569;
        }

        .total-row.grand-total {
            font-weight: 700;
            font-size: 16px;
            color: #0f172a;
            border-top: 1px solid #0f172a;
            padding-top: 12px;
            margin-top: 8px;
        }

        .doc-footer {
            margin-top: 50px;
            font-size: 12px;
            color: #64748b;
            line-height: 1.5;
        }

        /* IMPRESSION NETTE */
        @media print {
            body { background: white; padding: 0; }
            .control-panel, .no-print { display: none !important; }
            .document-preview { border: none; box-shadow: none; padding: 0; width: 100%; }
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <!-- PANNEAU DE CONFIGURATION DISCRET -->
    <div class="control-panel no-print">
        <div class="nav-pills">
            <button class="nav-link active" onclick="togglePane('devis-pane')">📝 Édition du Devis</button>
            <button class="nav-link" onclick="togglePane('paiement-pane')">💳 Situations & Acomptes</button>
        </div>

        <!-- SAISIE DEVIS -->
        <div id="devis-pane" class="pane active">
            <div class="form-grid">
                <textarea id="raw-input" rows="4" placeholder="Collez ici les lignes de l'assistant IA..."></textarea>
                <input type="text" id="client" placeholder="Nom du client ou référence du projet">
                <button class="btn btn-success" onclick="buildDevis()">Générer le document</button>
            </div>
        </div>

        <!-- SAISIE PAIEMENT -->
        <div id="paiement-pane" class="pane">
            <div class="form-grid" style="grid-template-columns: 1fr 1fr; gap: 10px;">
                <div style="grid-column: span 2;">
                    <input type="number" id="total-contrat" placeholder="Montant total du marché (FCFA)">
                </div>
                <div>
                    <input type="number" id="amount-paid" placeholder="Montant versé (FCFA)">
                </div>
                <div>
                    <select id="pay-method">
                        <option value="Mobile Money">Mobile Money</option>
                        <option value="Espèces">Espèces</option>
                        <option value="Virement">Virement</option>
                    </select>
                </div>
                <button class="btn" style="grid-column: span 2;" onclick="savePayment()">Enregistrer le versement</button>
            </div>
            <div class="history-list" id="history-render"></div>
            <button class="btn btn-success" style="margin-top: 12px;" onclick="window.print()">Imprimer la situation</button>
        </div>
    </div>

    <!-- LE DOCUMENT UNIQUE PROPRE ET NET -->
    <div class="document-preview" id="document-view">
        <div style="text-align: center; color: #94a3b8; padding-top: 100px;">
            <p>Le document professionnel (Devis ou Reçu) s'affichera ici instantanément après saisie.</p>
        </div>
    </div>
</div>

<script>
    let rowsData = [];
    let ledger = JSON.parse(localStorage.getItem('app_ledger')) || [];

    function togglePane(paneId) {
        document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
        document.getElementById(paneId).classList.add('active');
        event.currentTarget.classList.add('active');
        if(paneId === 'paiement-pane') { renderLedger(); buildReceipt(); }
    }

    function format(val) { return Number(val).toLocaleString('fr-FR') + " F"; }

    function buildDevis() {
        const txt = document.getElementById('raw-input').value;
        const clientName = document.getElementById('client').value || "Client / Particulier";
        if(!txt.trim()) return;

        rowsData = [];
        txt.split(/\n\s*\n/).forEach(b => {
            let item = { d: '', q: 0, u: '', p: 0 };
            b.split('\n').forEach(l => {
                if(l.startsWith('Désignation :')) item.d = l.replace('Désignation :', '').trim();
                if(l.startsWith('Quantité :')) item.q = parseInt(l.replace('Quantité :', '').trim()) || 0;
                if(l.startsWith('Unité :')) item.u = l.replace('Unité :', '').trim();
                if(l.startsWith('Prix Unitaire :')) item.p = parseFloat(l.replace('Prix Unitaire :', '').trim()) || 0;
            });
            if(item.d) rowsData.push(item);
        });

        let total = 0;
        let rowsHtml = rowsData.map(r => {
            let t = r.q * r.p; total += t;
            return `<tr><td>${r.d}</td><td class="text-right">${r.q}</td><td>${r.u}</td><td class="text-right">${format(r.p)}</td><td class="text-right" style="font-weight:600;">${format(t)}</td></tr>`;
        }).join('');

        document.getElementById('total-contrat').value = total;

        document.getElementById('document-view').innerHTML = `
            <div class="doc-header">
                <div>
                    <h1 style="margin:0; font-size:22px; font-weight:800; color:#0f172a;">VOTRE ENTREPRISE</h1>
                    <p style="margin:4px 0; font-size:13px; color:#64748b;">Lomé, Togo • Tél: +228 ...</p>
                </div>
                <div class="text-right">
                    <h2 class="doc-title">DEVIS DE TRAVAUX</h2>
                    <p style="margin:4px 0; font-size:13px; color:#64748b;"><b>Date :</b> ${new Date().toLocaleDateString('fr-FR')}</p>
                    <p style="margin:10px 0 0 0; font-size:13px; border:1px solid var(--border); padding:6px 12px; border-radius:6px; inline-block; text-align:left;">
                        <b>Client :</b> ${clientName}
                    </p>
                </div>
            </div>
            <table class="doc-table">
                <thead><tr><th>Désignation</th><th class="text-right">Qté</th><th>Unité</th><th class="text-right">P.U.</th><th class="text-right">Total</th></tr></thead>
                <tbody>${rowsHtml}</tbody>
            </table>
            <div class="doc-totals">
                <div class="total-row"><span>Sous-total HT</span> <span>${format(total)}</span></div>
                <div class="total-row grand-total"><span>TOTAL TTC</span> <span>${format(total)}</span></div>
            </div>
            <div class="doc-footer">
                <p><b>Conditions de règlement :</b> 50% à la commande, 50% à la livraison complète du chantier.</p>
            </div>`;
        window.print();
    }

    function savePayment() {
        const total = parseFloat(document.getElementById('total-contrat').value) || 0;
        const v = parseFloat(document.getElementById('amount-paid').value) || 0;
        const m = document.getElementById('pay-method').value;
        if(v <= 0) return;

        ledger.push({ date: new Date().toLocaleDateString('fr-FR'), method: m, value: v });
        localStorage.setItem('app_ledger', JSON.stringify(ledger));
        document.getElementById('amount-paid').value = '';
        renderLedger();
        buildReceipt();
    }

    function removePayment(i) {
        ledger.splice(i, 1);
        localStorage.setItem('app_ledger', JSON.stringify(ledger));
        renderLedger();
        buildReceipt();
    }

    function renderLedger() {
        const box = document.getElementById('history-render');
        if(!ledger.length) { box.innerHTML = '<p style="padding:10px; color:#94a3b8; font-size:12px; margin:0;">Aucun versement enregistré</p>'; return; }
        box.innerHTML = ledger.map((p, i) => `<div class="history-item"><div><b>${p.value.toLocaleString()} F</b> (${p.method})</div><button style="background:none; border:none; cursor:pointer;" onclick="removePayment(${i})">❌</button></div>`).join('');
    }

    function buildReceipt() {
        const total = parseFloat(document.getElementById('total-contrat').value) || 0;
        const clientName = document.getElementById('client').value || "Client / Particulier";
        let paid = 0;
        let rows = ledger.map((p, i) => { paid += p.value; return `<tr><td>Acompte N°${i+1} (${p.date})</td><td>${p.method}</td><td class="text-right" style="color:#16a34a; font-weight:600;">- ${format(p.value)}</td></tr>`; }).join('');

        document.getElementById('document-view').innerHTML = `
            <div class="doc-header">
                <div>
                    <h1 style="margin:0; font-size:22px; font-weight:800; color:#0f172a;">VOTRE ENTREPRISE</h1>
                    <p style="margin:4px 0; font-size:13px; color:#64748b;">Lomé, Togo</p>
                </div>
                <div class="text-right">
                    <h2 class="doc-title" style="color:var(--danger);">SITUATION DE COMPTE</h2>
                    <p style="margin:4px 0; font-size:13px; color:#64748b;"><b>Mise à jour :</b> ${new Date().toLocaleDateString('fr-FR')}</p>
                    <p style="margin:10px 0 0 0; font-size:13px; border:1px solid var(--border); padding:6px 12px; border-radius:6px; text-align:left;"><b>Client :</b> ${clientName}</p>
                </div>
            </div>
            <table class="doc-table">
                <thead><tr><th>Désignation du mouvement</th><th>Mode</th><th class="text-right">Montant</th></tr></thead>
                <tbody>
                    <tr><td><b>Montant total initial du marché</b></td><td>—</td><td class="text-right" style="font-weight:600;">${format(total)}</td></tr>
                    ${rows}
                </tbody>
            </table>
            <div class="doc-totals">
                <div class="total-row"><span>Total encaissé :</span> <span style="color:#16a34a; font-weight:600;">${format(paid)}</span></div>
                <div class="total-row grand-total" style="color:var(--danger);"><span>RESTE À PAYER :</span> <span>${format(total - paid)}</span></div>
            </div>
            <div class="doc-footer" style="text-align:center; border-top:1px dashed var(--border); padding-top:20px;">
                <p><i>Ce relevé certifie la situation financière du projet à ce jour. Document édité pour servir de reçu officiel.</i></p>
            </div>`;
    }
</script>
</body>
</html>
