<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Devis & Suivi Paiements BTP</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --secondary-color: #28a745;
            --danger-color: #dc3545;
            --bg-color: #f8f9fa;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: #e9ecef;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        h2, h3 {
            color: #222;
            border-left: 4px solid var(--primary-color);
            padding-left: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 15px;
        }

        button.btn-action {
            width: 100%;
            padding: 12px;
            background: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .history-list {
            margin-top: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            max-height: 200px;
            overflow-y: auto;
            background: #fafafa;
        }

        .history-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .btn-delete {
            background: var(--danger-color);
            color: white;
            border: none;
            padding: 5px 8px;
            border-radius: 3px;
            cursor: pointer;
        }

        /* Styles d'impression et rendu PDF */
        #pdf-preview {
            background: white;
            padding: 30px;
            border: 1px solid #ccc;
            margin-top: 20px;
        }

        .pdf-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .pdf-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .pdf-table th, .pdf-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        .pdf-table th {
            background-color: #f1f1f1;
        }

        .text-right {
            text-align: right;
        }

        .totals-box {
            margin-top: 20px;
            margin-left: auto;
            width: 300px;
        }

        .totals-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .totals-row.final {
            font-weight: bold;
            font-size: 18px;
            border-top: 2px solid #333;
            color: #000;
        }

        @media print {
            body * {
                visibility: hidden;
            }
            #pdf-preview, #pdf-preview * {
                visibility: visible;
            }
            #pdf-preview {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                border: none;
                padding: 0;
            }
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Onglets de navigation -->
    <div class="tabs no-print">
        <button class="tab-btn active" onclick="switchTab('devis-tab')">📝 Créer un Devis</button>
        <button class="tab-btn" onclick="switchTab('paiement-tab')">💳 Suivi des Paiements</button>
    </div>

    <!-- ONGLET 1 : CRÉATION DE DEVIS -->
    <div id="devis-tab" class="tab-content active">
        <h2>Création du Devis</h2>
        <div class="form-group">
            <label>Assistant IA (Coller le texte du devis ici) :</label>
            <textarea id="ai-input" rows="6" placeholder="Collez les lignes du devis générées par l'IA..."></textarea>
        </div>
        <div class="form-group">
            <label>Nom du Client / Projet :</label>
            <input type="text" id="client-name" placeholder="Ex: Jean DUPONT - Électricité Villa">
        </div>
        <button class="btn-action" onclick="genererDevis()">Générer le Devis PDF</button>
    </div>

    <!-- ONGLET 2 : SUIVI DES PAIEMENTS -->
    <div id="paiement-tab" class="tab-content">
        <h2>Enregistrer un Règlement</h2>
        <div class="form-group">
            <label>Montant total du contrat (FCFA) :</label>
            <input type="number" id="pay-total-contrat" oninput="calculerReste()" placeholder="Ex: 6382500">
        </div>
        <div class="form-group">
            <label>Nouveau Versement reçu (FCFA) :</label>
            <input type="number" id="pay-versement" placeholder="Ex: 3000000">
        </div>
        <div class="form-group">
            <label>Mode de règlement :</label>
            <select id="pay-mode">
                <option value="Mobile Money (T-Money/Flooz)">Mobile Money (T-Money/Flooz)</option>
                <option value="Espèces">Espèces</option>
                <option value="Virement Bancaire">Virement Bancaire</option>
                <option value="Chèque">Chèque</option>
            </select>
        </select>
        </div>
        <button class="btn-action" style="background-color: var(--primary-color);" onclick="ajouterPaiement()">Enregistrer & Mettre à jour le Reçu</button>

        <h3>Historique des versements pour ce projet</h3>
        <div class="history-list" id="history-box">
            <!-- Rempli en JS -->
        </div>

        <button class="btn-action" style="margin-top: 20px;" onclick="window.print()">🖨️ Imprimer / Enregistrer le Reçu en PDF</button>
    </div>

    <hr class="no-print" style="margin: 30px 0; border: 1px solid #ddd;">

    <!-- ZONE D'APERÇU DU DOCUMENT (DEVIS OU REÇU PAIEMENT) -->
    <div id="pdf-preview">
        <!-- Le contenu dynamique du PDF (Devis ou Reçu) s'affichera ici -->
        <p style="text-align: center; color: #777;">Remplissez les informations ci-dessus pour générer le document.</p>
    </div>
</div>

<script>
    // Variables globales pour stocker les états
    let devisLignes = [];
    let paiementsHistorique = JSON.parse(localStorage.getItem('btp_paiements')) || [];

    // Changer d'onglet
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');

        if(tabId === 'paiement-tab') {
            afficherHistorique();
            genererRecuHTML();
        }
    }

    // Formater les prix proprement (Ex: 6 382 500 F)
    function formatMoney(amount) {
        return Number(amount).toLocaleString('fr-FR') + " F";
    }

    // ANALYSE ET GÉNÉRATION DE DEVIS
    function genererDevis() {
        const text = document.getElementById('ai-input').value;
        const client = document.getElementById('client-name').value || "Client / Particulier";
        
        if(!text.trim()) {
            alert("Veuillez d'abord coller le texte du devis !");
            return;
        }

        devisLignes = [];
        const blocks = text.split(/\n\s*\n/);
        
        blocks.forEach(block => {
            const lignes = block.split('\n');
            let item = { designation: '', quantite: 0, unite: '', prix: 0 };
            
            lignes.forEach(l => {
                if(l.startsWith('Désignation :')) item.designation = l.replace('Désignation :', '').trim();
                if(l.startsWith('Quantité :')) item.quantite = parseInt(l.replace('Quantité :', '').trim()) || 0;
                if(l.startsWith('Unité :')) item.unite = l.replace('Unité :', '').trim();
                if(l.startsWith('Prix Unitaire :')) item.prix = parseFloat(l.replace('Prix Unitaire :', '').trim()) || 0;
            });
            
            if(item.designation) {
                devisLignes.push(item);
            }
        });

        let totalGeneral = 0;
        let tableauHTML = '';

        devisLignes.forEach(l => {
            let totalLigne = l.quantite * l.prix;
            totalGeneral += totalLigne;
            tableauHTML += `
                <tr>
                    <td>${l.designation}</td>
                    <td class="text-right">${l.quantite}</td>
                    <td>${l.unite}</td>
                    <td class="text-right">${formatMoney(l.prix)}</td>
                    <td class="text-right" style="font-weight: bold;">${formatMoney(totalLigne)}</td>
                </tr>
            `;
        });

        // Préchauffer le montant du contrat dans l'onglet Paiement
        document.getElementById('pay-total-contrat').value = totalGeneral;

        const dateDuJour = new Date().toLocaleDateString('fr-FR');

        document.getElementById('pdf-preview').innerHTML = `
            <div class="pdf-header">
                <div>
                    <h1 style="margin: 0; font-size: 22px; font-weight: bold; letter-spacing: 0.5px;">VOTRE ENTREPRISE</h1>
                    <p style="margin: 5px 0; font-size: 13px; color: #55px;">Tel: +228 ...<br>Adresse: Lomé</p>
                </div>
                <div class="text-right">
                    <h2 style="margin: 0; font-size: 18px; color: #111; border: none; padding: 0;">DEVIS DE TRAVAUX</h2>
                    <p style="margin: 5px 0; font-size: 13px;"><b>Date d'émission :</b> ${dateDuJour}</p>
                    <p style="margin: 10px 0 0 0; font-size: 13px; border: 1px solid #ccc; padding: 5px; text-align: left; border-radius: 4px;">
                        <b>Destinataire :</b><br>${client}
                    </p>
                </div>
            </div>
            
            <table class="pdf-table">
                <thead>
                    <tr>
                        <th>Désignation des travaux</th>
                        <th class="text-right">Quantité</th>
                        <th>Unité</th>
                        <th class="text-right">Prix Unitaire</th>
                        <th class="text-right">Total</th>
                    </tr>
                </thead>
                <tbody>
                    ${tableauHTML}
                </tbody>
            </table>

            <div class="totals-box">
                <div class="totals-row"><span>Sous-total HT :</span> <span>${formatMoney(totalGeneral)}</span></div>
                <div class="totals-row"><span>Remise :</span> <span>0 F</span></div>
                <div class="totals-row final"><span>TOTAL TTC :</span> <span>${formatMoney(totalGeneral)}</span></div>
            </div>

            <div style="margin-top: 40px; font-size: 11px; color: #55px;">
                <p><b>Notes & Conditions :</b><br>Paiement : 50% à la commande, 50% à la livraison.<br>Délai d'exécution : à préciser après validation.</p>
            </div>
        `;
        
        // Déclencher automatiquement la fonction d'impression native du téléphone
        window.print();
    }

    // GESTION DU SUIVI DES PAIEMENTS
    function ajouterPaiement() {
        const totalContrat = parseFloat(document.getElementById('pay-total-contrat').value) || 0;
        const versement = parseFloat(document.getElementById('pay-versement').value) || 0;
        const mode = document.getElementById('pay-mode').value;
        const date = new Date().toLocaleDateString('fr-FR');

        if(versement <= 0) {
            alert("Veuillez saisir un montant de versement valide.");
            return;
        }

        // Ajouter à l'historique
        paiementsHistorique.push({ date, mode, versement });
        localStorage.setItem('btp_paiements', JSON.stringify(paiementsHistorique));

        // Reset le champ versement
        document.getElementById('pay-versement').value = '';

        afficherHistorique();
        genererRecuHTML();
    }

    function supprimerPaiement(index) {
        if(confirm("Supprimer ce versement ?")) {
            paiementsHistorique.splice(index, 1);
            localStorage.setItem('btp_paiements', JSON.stringify(paiementsHistorique));
            afficherHistorique();
            genererRecuHTML();
        }
    }

    function afficherHistorique() {
        const box = document.getElementById('history-box');
        if(paiementsHistorique.length === 0) {
            box.innerHTML = '<p style="padding: 10px; color: #777; margin:0;">Aucun versement enregistré.</p>';
            return;
        }

        box.innerHTML = paiementsHistorique.map((p, index) => `
            <div class="history-item">
                <div>
                    <b>${p.date}</b> - ${p.mode}<br>
                    <span style="color: var(--secondary-color); font-weight: bold;">+ ${formatMoney(p.versement)}</span>
                </div>
                <button class="btn-delete" onclick="supprimerPaiement(${index})">❌</button>
            </div>
        `).join('');
    }

    function genererRecuHTML() {
        const totalContrat = parseFloat(document.getElementById('pay-total-contrat').value) || 0;
        const client = document.getElementById('client-name').value || "Client / Particulier";
        const dateDuJour = new Date().toLocaleDateString('fr-FR');

        let cumulVerse = 0;
        let tableauPaiementsHTML = '';

        paiementsHistorique.forEach((p, i) => {
            cumulVerse += p.versement;
            tableauPaiementsHTML += `
                <tr>
                    <td>Versement N°${i+1} (${p.date})</td>
                    <td>${p.mode}</td>
                    <td class="text-right" style="color: green; font-weight: bold;">- ${formatMoney(p.versement)}</td>
                </tr>
            `;
        });

        const resteAPayer = totalContrat - cumulVerse;

        document.getElementById('pdf-preview').innerHTML = `
            <div class="pdf-header">
                <div>
                    <h1 style="margin: 0; font-size: 22px; font-weight: bold; letter-spacing: 0.5px;">VOTRE ENTREPRISE</h1>
                    <p style="margin: 5px 0; font-size: 13px; color: #555;">Tel: +228 ...<br>Adresse: Lomé</p>
                </div>
                <div class="text-right">
                    <h2 style="margin: 0; font-size: 18px; color: #dc3545; border: none; padding: 0;">SITUATION DE PAIEMENT</h2>
                    <p style="margin: 5px 0; font-size: 13px;"><b>Date de mise à jour :</b> ${dateDuJour}</p>
                    <p style="margin: 10px 0 0 0; font-size: 13px; border: 1px solid #ccc; padding: 5px; text-align: left; border-radius: 4px;">
                        <b>Client :</b> ${client}
                    </p>
                </div>
            </div>

            <h3 style="margin-top: 30px;">Historique des Règlements Reçus</h3>
            <table class="pdf-table">
                <thead>
                    <tr>
                        <th>Désignation du paiement</th>
                        <th>Mode de règlement</th>
                        <th class="text-right">Montant Versé</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><b>Montant Initial du Contrat / Chantier</b></td>
                        <td>—</td>
                        <td class="text-right" style="font-weight: bold;">${formatMoney(totalContrat)}</td>
                    </tr>
                    ${tableauPaiementsHTML}
                </tbody>
            </table>

            <div class="totals-box" style="width: 350px;">
                <div class="totals-row"><span>Total déjà payé :</span> <span style="color: green; font-weight:bold;">${formatMoney(cumulVerse)}</span></div>
                <div class="totals-row final" style="color: ${resteAPayer <= 0 ? 'green' : 'var(--danger-color)'};">
                    <span>RESTE À PAYER :</span> 
                    <span>${formatMoney(resteAPayer)}</span>
                </div>
            </div>

            <div style="margin-top: 60px; border-top: 1px dashed #ccc; padding-top: 15px; text-align: center; font-size: 13px; color: #555;">
                <p><i>Ce document certifie la bonne réception des sommes mentionnées ci-dessus.<br>Fait pour servir de preuve tangible et de reçu de paiement officiel.</i></p>
            </div>
        `;
    }
</script>

</body>
</html>
