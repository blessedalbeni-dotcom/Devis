<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTPDevis Pro</title>
    <style>
        :root {
            --primary: #d35400;
            --primary-hover: #b33921;
            --bg: #f5f6fa;
            --card-bg: #ffffff;
            --text: #333333;
            --success: #2ecc71;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 10px; }
        .container { max-width: 600px; margin: 0 auto; background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 2px solid #e1b12c; }
        .logo-title { font-size: 22px; font-weight: bold; }
        .logo-title span { color: var(--primary); }
        .badge { background: var(--primary); color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }

        /* Configuration Top */
        .config-box { background: #fff5eb; margin: 15px; padding: 15px; border-radius: 8px; border: 1px solid #ffe0c2; display: flex; gap: 10px; }
        .config-group { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .config-group label { font-size: 12px; font-weight: bold; color: var(--primary); }
        .config-group select, .config-group input { padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }

        /* Navigation Onglets */
        .tabs { display: flex; background: #e0e0e0; margin: 0 15px 15px 15px; border-radius: 8px; overflow: hidden; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; font-size: 14px; font-weight: bold; cursor: pointer; color: #555; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* Contenu des Onglets */
        .tab-content { display: none; padding: 0 15px 15px 15px; }
        .tab-content.active { display: block; }

        /* Formulaires et Styles Communs */
        .section-title { font-size: 16px; color: var(--primary); margin-bottom: 12px; font-weight: bold; display: flex; align-items: center; gap: 5px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .form-row .form-group { flex: 1; margin-bottom: 0; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        
        /* Boutons */
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-success { background: var(--success); color: white; margin-top: 15px; }

        /* Zone de Résultat Assistant */
        .result-box { background: #fff9f3; border: 1px solid #ffe4cc; border-radius: 8px; padding: 15px; margin-top: 15px; }
        .result-title { font-weight: bold; margin-bottom: 10px; text-transform: uppercase; font-size: 14px; }
        .result-item { font-size: 14px; margin-bottom: 6px; list-style: none; padding-left: 10px; position: relative; }
        .result-item::before { content: "•"; color: var(--primary); position: absolute; left: 0; }
        .total-box { background: var(--primary); color: white; text-align: center; padding: 10px; border-radius: 6px; font-weight: bold; margin-top: 15px; font-size: 16px; }

        /* Toast Notification */
        .toast { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="logo-title">BTP<span>Devis</span> Pro</div>
        <div class="badge">Lomé · FCFA</div>
    </div>

    <!-- Configuration Générale -->
    <div class="config-box">
        <div class="config-group">
            <label>🌍 Zone / Pays :</label>
            <select id="zonePays">
                <option value="togo">🇹🇬 Togo (Lomé)</option>
            </select>
        </div>
        <div class="config-group">
            <label>🖼️ URL du Logo :</label>
            <input type="text" placeholder="Lien direct de votre logo">
        </div>
    </div>

    <!-- Onglets de Navigation -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('creer')">📝 Créer</button>
        <button class="tab-btn" onclick="switchTab('assistant')">🤖 Assistant</button>
        <button class="tab-btn" onclick="switchTab('archives')">📁 Archives</button>
        <button class="tab-btn" onclick="switchTab('stats')">📊 Stats</button>
    </div>

    <!-- CONTENU : CRÉER -->
    <div id="tab-creer" class="tab-content active">
        <div class="section-title">👥 Informations Client</div>
        <div class="form-row">
            <div class="form-group">
                <label>Nom du Client :</label>
                <input type="text" placeholder="Ex: M. Ibrahim ALI">
            </div>
            <div class="form-group">
                <label>Téléphone :</label>
                <input type="text" placeholder="Ex: +228 70 02 01 03">
            </div>
        </div>
        <div class="form-group" style="margin-top: 10px;">
            <label>Adresse :</label>
            <input type="text" placeholder="Ex: Lomé, Agoè">
        </div>

        <div class="section-title" style="margin-top: 20px;">📝 Lignes de Travaux</div>
        <div class="form-group">
            <input type="text" placeholder="Désignation des travaux">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Quantité :</label>
                <input type="number" value="1">
            </div>
            <div class="form-group">
                <label>Prix Unitaire :</label>
                <input type="number" placeholder="Prix">
            </div>
        </div>
        <button class="btn btn-primary" style="margin-top: 15px;">➕ Ajouter Élément</button>
    </div>

    <!-- CONTENU : ASSISTANT (FUSIONNÉ) -->
    <div id="tab-assistant" class="tab-content">
        <div class="section-title">🏗️ L'Élite du Chantier</div>
        <p style="font-size: 13px; color: #666; font-style: italic; margin-bottom: 15px; text-align: center;">Assistant Multi-Métiers (Prix de Lomé)</p>
        
        <div class="form-group">
            <label>Sélectionner le domaine BTP :</label>
            <select id="domaineBTP">
                <option value="maconnerie">🧱 Gros Œuvre & Maçonnerie (par m²)</option>
                <option value="peinture">🎨 Peinture Finition (par m²)</option>
                <option value="carrelage">📐 Carrelage Sol (par m²)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Entrer la quantité :</label>
            <input type="number" id="quantiteAssistant" value="60" min="1">
        </div>

        <button class="btn btn-primary" onclick="genererDevisEstimatif()">Générer le Devis Estimatif</button>

        <!-- Zone d'affichage du résultat -->
        <div id="zoneResultat" style="display: none;">
            <div class="result-box" id="detailsDevis"></div>
            <button class="btn btn-success" onclick="copierPourWhatsApp()">💬 Copier pour WhatsApp</button>
        </div>
    </div>

    <!-- CONTENU : ARCHIVES -->
    <div id="tab-archives" class="tab-content">
        <div class="section-title">📁 Archives</div>
        <p style="color: #666; font-size: 14px;">Aucun devis archivé pour le moment.</p>
    </div>

    <!-- CONTENU : STATS -->
    <div id="tab-stats" class="tab-content">
        <div class="section-title">📊 Statistiques</div>
        <p style="color: #666; font-size: 14px;">Vos statistiques de ventes s'afficheront ici.</p>
    </div>
</div>

<!-- Notification Toast -->
<div id="toast" class="toast">📋 Copié avec succès !</div>

<script>
    // Gestion du changement d'onglets
    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        
        event.currentTarget.classList.add('active');
        document.getElementById('tab-' + tabId).classList.add('active');
    }

    // Variable globale pour stocker le texte WhatsApp
    let texteWhatsAppGlobal = "";

    // Logique de calcul de l'assistant automatique (Prix de Lomé)
    function genererDevisEstimatif() {
        const domaine = document.getElementById('domaineBTP').value;
        const qte = parseFloat(document.getElementById('quantiteAssistant').value) || 0;
        let detailHtml = "";
        let msgWA = "";
        let total = 0;

        if (domaine === "maconnerie") {
            let parpaings = qte * 10500;
            let ciment = qte * 10500;
            let sable = qte * 4500;
            let ferraillage = qte * 4000;
            let mainOeuvre = qte * 7500;
            total = parpaings + ciment + sable + ferraillage + mainOeuvre;

            detailHtml = `
                <div class="result-title">🧱 MAÇONNERIE (${qte} m²) :</div>
                <li class="result-item">Parpaings de 15 : ${parpaings.toLocaleString()} F</li>
                <li class="result-item">Ciment CPJ 45 : ${ciment.toLocaleString()} F</li>
                <li class="result-item">Sable & Gravier : ${sable.toLocaleString()} F</li>
                <li class="result-item">Ferraillage : ${ferraillage.toLocaleString()} F</li>
                <li class="result-item">Main d'œuvre : ${mainOeuvre.toLocaleString()} F</li>
                <div class="total-box">💰 TOTAL : ${total.toLocaleString()} FCFA</div>
            `;

            msgWA = `🧱 *MAÇONNERIE (${qte} m²)* :\n• Parpaings : ${parpaings.toLocaleString()} F\n• Ciment : ${ciment.toLocaleString()} F\n• Sable/Gravier : ${sable.toLocaleString()} F\n• Ferraillage : ${ferraillage.toLocaleString()} F\n• Main d'œuvre : ${mainOeuvre.toLocaleString()} F`;
        } 
        else if (domaine === "peinture") {
            let peintureMat = qte * 2500;
            let mainOeuvre = qte * 1500;
            total = peintureMat + mainOeuvre;

            detailHtml = `
                <div class="result-title">🎨 PEINTURE (${qte} m²) :</div>
                <li class="result-item">Fourniture Peinture : ${peintureMat.toLocaleString()} F</li>
                <li class="result-item">Main d'œuvre Peintre : ${mainOeuvre.toLocaleString()} F</li>
                <div class="total-box">💰 TOTAL : ${total.toLocaleString()} FCFA</div>
            `;

            msgWA = `🎨 *PEINTURE (${qte} m²)* :\n• Fourniture : ${peintureMat.toLocaleString()} F\n• Main d'œuvre : ${mainOeuvre.toLocaleString()} F`;
        }
        else if (domaine === "carrelage") {
            let carreaux = qte * 5500;
            let cimentColle = qte * 2000;
            let mainOeuvre = qte * 2500;
            total = carreaux + cimentColle + mainOeuvre;

            detailHtml = `
                <div class="result-title">📐 CARRELAGE (${qte} m²) :</div>
                <li class="result-item">Carreaux & Joints : ${carreaux.toLocaleString()} F</li>
                <li class="result-item">Ciment Colle & Sable : ${cimentColle.toLocaleString()} F</li>
                <li class="result-item">Main d'œuvre Carreleur : ${mainOeuvre.toLocaleString()} F</li>
                <div class="total-box">💰 TOTAL : ${total.toLocaleString()} FCFA</div>
            `;

            msgWA = `📐 *CARRELAGE (${qte} m²)* :\n• Carreaux : ${carreaux.toLocaleString()} F\n• Ciment Colle : ${cimentColle.toLocaleString()} F\n• Main d'œuvre : ${mainOeuvre.toLocaleString()} F`;
        }

        document.getElementById('detailsDevis').innerHTML = detailHtml;
        document.getElementById('zoneResultat').style.display = "block";

        // Préparation du message final WhatsApp
        texteWhatsAppGlobal = `🏗️ *L'ÉLITE DU CHANTIER - DEVIS PRO*\n\n` + msgWA + `\n\n*💰 TOTAL ESTIMATIF : ${total.toLocaleString()} FCFA*\n\n_Généré avec l'Assistant Multi-Métiers._`;
    }

    // Fonction Copier pour WhatsApp
    function copierPourWhatsApp() {
        navigator.clipboard.writeText(texteWhatsAppGlobal).then(() => {
            const toast = document.getElementById('toast');
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 3000);
        }).catch(() => {
            alert("Erreur de copie. Sélectionnez le texte manuellement.");
        });
    }
</script>

</body>
</html>
